<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64b5f6"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Chat bubble -->
  <path d="M256,90 C160,90 82,152 82,230 C82,280 112,324 158,352 L138,410 L205,370 C220,375 238,378 256,378 C352,378 430,316 430,238 C430,152 352,90 256,90 Z"
        fill="url(#bubble)" opacity="0.9"/>
  <!-- Infinity symbol inside bubble — larger, serif-style with tapered strokes -->
  <g transform="translate(256,228)">
    <!-- Main infinity path with varying thickness via filled shape -->
    <path d="M0,-6
             C-18,-52 -95,-55 -95,-4
             C-95,48 -18,50 0,6
             C18,-50 95,-48 95,-4
             C95,55 18,52 0,6
             Z
             M0,0
             C-14,-36 -78,-38 -78,-4
             C-78,32 -14,34 0,0
             C14,-34 78,-32 78,-4
             C78,38 14,36 0,0
             Z"
          fill="#1a1a2e" fill-rule="evenodd" opacity="0.85"/>
    <!-- Serif terminals — small wedge accents at the crossover -->
    <ellipse cx="0" cy="0" rx="8" ry="14" fill="#1a1a2e" opacity="0.85"/>
  </g>
</svg>
