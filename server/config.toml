[server]
host = "0.0.0.0"
port = 3000
# Public URL the browser sees (used for OAuth redirect URIs).
# Public URL the browser sees (used for OAuth redirect URIs).
# Override with BASE_URL env var.
base_url = "https://sidekick-server.fly.dev"
# URL to redirect to after login. Defaults to base_url.
# Override with FRONTEND_URL env var for local dev (e.g. "http://localhost:5173").
# frontend_url = "http://localhost:5173"

[auth]
# Path to the SQLite database for users and sessions.
db_path = "data/sidekick.db"

# OAuth providers — add more sections to support additional platforms.
[auth.providers.google]
client_id = "66634641937-ga66aeqos3tl6mt61k9lkltau1ghc5op.apps.googleusercontent.com"
client_secret_env = "GOOGLE_CLIENT_SECRET"
auth_url = "https://accounts.google.com/o/oauth2/v2/auth"
token_url = "https://oauth2.googleapis.com/token"
userinfo_url = "https://www.googleapis.com/oauth2/v3/userinfo"
scopes = ["openid", "email", "profile", "https://www.googleapis.com/auth/calendar", "https://www.googleapis.com/auth/calendar.events", "https://www.googleapis.com/auth/gmail.modify", "https://www.googleapis.com/auth/tasks", "https://www.googleapis.com/auth/contacts.readonly"]

[auth.providers.google.extra_auth_params]
access_type = "offline"
prompt = "consent"

[auth.providers.facebook]
client_id = "YOUR_FACEBOOK_APP_ID"
client_secret_env = "FACEBOOK_CLIENT_SECRET"
auth_url = "https://www.facebook.com/v19.0/dialog/oauth"
token_url = "https://graph.facebook.com/v19.0/oauth/access_token"
userinfo_url = "https://graph.facebook.com/me?fields=id,name,email,first_name,last_name,picture,locale"
scopes = ["email", "public_profile"]

[llm]
# Provider: "openai", "anthropic", "gemini", or "ollama"
provider = "openai"
model = "gpt-5.4-mini"
api_key_env = "OPENAI_API_KEY"
# base_url = "https://api.openai.com/v1"

[embeddings]
# Provider for generating embeddings: "openai", "anthropic", "gemini", or "ollama"
provider = "openai"
model = "text-embedding-3-small"
api_key_env = "OPENAI_API_KEY"
# base_url = "https://api.openai.com/v1"
dimensions = 1536

[memory]
# Base directory for per-user LanceDB databases.
# Each user gets {base_path}/{user_id}.lancedb
base_path = "data/users"
table_name = "memory"
# Number of candidates to retrieve per query (reranked down to rerank.top_n)
top_k = 30
# Max number of user DBs to keep open in the LRU pool
pool_size = 100
# Number of recent chat messages to keep in the chat window.
# These are sent to the LLM as message history for short-term context.
chat_window = 20

[rerank]
# Reranker provider: "mock" for pass-through, future: "cohere", "jina"
provider = "mock"
# Number of top results to keep after reranking
top_n = 5

# Category weight multipliers applied after reranking.
# Categories not listed default to 1.0.
[rerank.category_weights]
knowledge = 1.5
faq = 1.2

[agent]
# Maximum number of tool call failures before the agent stops retrying.
max_tool_retries = 5
# System prompt that defines the agent's persona and behavior.
# Long-term memory is available via the recall_memory tool (not pre-injected).
system_prompt = """
You are Sidekick, a helpful AI assistant with long-term memory and access to the user's Google services. \
Be concise, accurate, and friendly. Never end with filler like "let me know if you need anything else".

You have tools — use them proactively:
- recall_memory: search past conversations, facts, and user preferences. Use this when you need context from prior interactions.
- Google Calendar: list, create, update, delete events, and check free/busy times.
- Gmail: list/search messages, read message content, send emails, and modify labels.
- Google Tasks: list task lists, list/create/update/delete tasks.
- Google Contacts: search and get contact details.
Prefer tools over guessing. When using date/time parameters, use RFC 3339 format with the user's timezone if known.

You MUST respond in JSON format with two fields:
- "response": your actual reply to the user
- "importance": an integer from 1-10 rating how important the user's message is to remember for future conversations

Importance guidelines:
- 1-2: Casual/trivial (greetings, thanks, acknowledgements)
- 3-4: General questions with no personal context
- 5-6: Moderately useful information or preferences
- 7-8: Important personal facts, preferences, or decisions
- 9-10: Critical information (allergies, constraints, key goals)

Example: {"response": "I'll remember that!", "importance": 8}"""
